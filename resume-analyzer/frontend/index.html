<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEURAL MATCHER &mdash; PIXEL CONTRAST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* LIGHT THEME: WHITE & BLACK */
      --bg: #ffffff;
      --card-bg: #ffffff;
      --text-main: #000000;
      --text-dim: #666666;
      --accent: #222222;
      --border: #000000;
      --shadow: rgba(0, 0, 0, 0.1);
      --indicator: #000000;
      --tag-match: #000000;
      --tag-gap: rgba(0, 0, 0, 0.05);
      --transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      /* DARK THEME: PIXEL BLACK & WHITE */
      --bg: #000000;
      --card-bg: #000000;
      --text-main: #ffffff;
      --text-dim: #999999;
      --accent: #ffffff;
      --border: #ffffff;
      --shadow: rgba(255, 255, 255, 0.05);
      --indicator: #ffffff;
      --tag-match: #ffffff;
      --tag-gap: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    h1, .label, .btn-primary { font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
    code, pre, textarea, .mono { font-family: 'JetBrains Mono', monospace; }

    /* Navigation */
    nav {
      position: fixed; top: 0; width: 100%; height: 72px; z-index: 1000;
      background: var(--bg); border-bottom: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }

    .nav-content {
      width: 100%; max-width: 1100px; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo { font-size: 1.2rem; font-weight: 900; border: 2.5px solid var(--border); padding: 4px 10px; }

    .theme-toggle {
      background: var(--text-main); color: var(--bg);
      border: none; padding: 8px 16px; font-weight: 800; cursor: pointer;
      font-size: 0.75rem; text-transform: uppercase;
    }

    /* Main Container */
    main {
      padding-top: 140px; padding-bottom: 140px;
      width: 100%; max-width: 800px; margin: 0 auto;
      padding-left: 32px; padding-right: 32px;
    }

    /* Hero */
    .hero { margin-bottom: 80px; }
    .hero h1 { font-size: clamp(3rem, 10vw, 5rem); line-height: 0.9; margin-bottom: 24px; }
    .hero p { font-size: 1.1rem; color: var(--text-dim); max-width: 500px; font-weight: 500; }

    /* Sections */
    .section-card {
      border: 3px solid var(--border);
      padding: 40px; margin-bottom: 40px;
      background: var(--card-bg);
      box-shadow: 12px 12px 0px var(--border);
      transition: transform 0.2s;
    }

    .section-card:hover { transform: translate(-4px, -4px); box-shadow: 16px 16px 0px var(--border); }

    .label { font-size: 0.8rem; margin-bottom: 24px; display: block; border-bottom: 2px solid var(--border); padding-bottom: 8px; width: fit-content; }

    /* Inputs */
    .drop-pixel {
      border: 2px dashed var(--border); padding: 80px 24px; text-align: center; cursor: pointer;
      transition: background 0.2s;
    }
    .drop-pixel:hover { background: var(--shadow); }
    .drop-text { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; }

    textarea {
      width: 100%; height: 250px; background: transparent; border: 2px solid var(--border);
      padding: 24px; color: var(--text-main); font-size: 1rem; outline: none;
    }

    /* Primary CTA */
    .btn-pixel {
      width: 100%; background: var(--text-main); color: var(--bg); border: none;
      padding: 32px; font-size: 1.8rem; cursor: pointer; font-family: 'Outfit', sans-serif;
      font-weight: 900; text-transform: uppercase;
      box-shadow: 10px 10px 0px var(--text-dim);
      transition: 0.2s;
    }
    .btn-pixel:hover { transform: translate(-4px, -4px); box-shadow: 14px 14px 0px var(--text-dim); }
    .btn-pixel:active { transform: translate(0, 0); box-shadow: 6px 6px 0px var(--text-dim); }

    /* Results */
    #resultsPortal { display: none; margin-top: 100px; }

    .score-block { text-align: center; margin-bottom: 80px; }
    .score-val { font-size: 10rem; font-weight: 900; line-height: 0.8; margin-bottom: 16px; }
    .grade-label { font-size: 2rem; font-weight: 900; background: var(--text-main); color: var(--bg); padding: 8px 24px; display: inline-block; }

    /* Data Points */
    .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 24px; }
    
    .data-tag {
      padding: 12px 16px; border: 2.5px solid var(--border); 
      font-size: 0.8rem; font-weight: 800; text-transform: uppercase;
      text-align: center; transition: 0.2s; cursor: default;
    }

    .tag-active { background: var(--text-main); color: var(--bg); }
    .tag-dim { color: var(--text-dim); border-color: var(--text-dim); border-style: dashed; }

    /* Optimization Protocol */
    .protocol-step {
      border-left: 6px solid var(--border); padding-left: 24px; margin-bottom: 32px;
    }

    .loader {
      width: 28px; height: 28px; border: 5px solid var(--bg);
      border-top-color: var(--text-main); border-radius: 50%;
      animation: spin 0.8s linear infinite; display: none; margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #notifier {
      position: fixed; top: 100px; right: 40px;
      background: var(--text-main); color: var(--bg);
      padding: 16px 32px; font-weight: 900; text-transform: uppercase;
      border: 3px solid var(--border); z-index: 10000; display: none;
    }
  </style>
</head>
<body data-theme="dark">

<nav>
  <div class="nav-content">
    <div class="logo">NEURAL.01</div>
    <button class="theme-toggle" onclick="toggleTheme()">INVERT</button>
  </div>
</nav>

<main>
  <section class="hero">
    <h1>High. Contrast.</h1>
    <p>Mass profile analysis via neural architecture. Pixel-perfect comparison between resume and criteria.</p>
  </section>

  <div class="section-card">
    <span class="label">01 // SOURCE DOCUMENT</span>
    <div class="drop-pixel" id="dropZone">
      <div class="drop-text">DEPLOY PDF</div>
      <div id="fileIndicator" class="mono" style="margin-top:20px; font-size:0.8rem;"></div>
      <input type="file" id="resumeFile" accept=".pdf" style="display:none;" />
    </div>
  </div>

  <div class="section-card">
    <span class="label">02 // SELECTION CRITERIA</span>
    <textarea id="jobDesc" placeholder="PASTE MANDATE..."></textarea>
  </div>

  <button class="btn-pixel" id="analyzeBtn" onclick="runAnalysis()">
    <div class="loader" id="loader"></div>
    <span id="btnText">EXECUTE MATCH</span>
  </button>

  <div id="resultsPortal">
    <div class="score-block">
      <div class="score-val" id="finalScore">0</div>
      <div class="grade-label" id="gradeLabel">—</div>
    </div>

    <div class="section-card">
      <span class="label">MATCHED COMPETENCIES</span>
      <div class="data-grid" id="matchedSkills"></div>
    </div>

    <div class="section-card">
      <span class="label">NEURAL DISCREPANCIES</span>
      <div class="data-grid" id="missingSkills"></div>
    </div>

    <div class="section-card">
      <span class="label">OPTIMIZATION STRATEGY</span>
      <div id="suggestionsBox"></div>
    </div>

    <div class="section-card">
      <span class="label">EXTRACTED PROFILE MAP</span>
      <div class="data-grid" id="allSkills"></div>
    </div>
  </div>
</main>

<div id="notifier"></div>

<script>
  const API = window.location.origin;

  function toggleTheme() {
    const body = document.body;
    const isDark = body.getAttribute('data-theme') === 'dark';
    body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }

  // Dropzone
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('resumeFile');
  const fileIndicator = document.getElementById('fileIndicator');

  dropZone.addEventListener('click', () => fileInput.click());

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
  });

  dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
       fileInput.files = e.dataTransfer.files;
       fileIndicator.textContent = "// SOURCE: " + file.name.toUpperCase();
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) fileIndicator.textContent = "// SOURCE: " + fileInput.files[0].name.toUpperCase();
  });

  async function runAnalysis() {
    const file = fileInput.files[0];
    const jd = document.getElementById('jobDesc').value.trim();

    if (!file) return notify("RESUME MANDATORY.");
    if (!jd) return notify("CRITERIA MANDATORY.");

    setLoading(true);
    document.getElementById('resultsPortal').style.display = 'none';

    const formData = new FormData();
    formData.append('resume', file);
    formData.append('job_description', jd);

    try {
      const resp = await fetch(`${API}/analyze`, { method: 'POST', body: formData });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || "SYSTEM FAILURE.");
      presentResults(data);
    } catch (err) {
      notify(err.message);
    } finally {
      setLoading(false);
    }
  }

  function presentResults(data) {
    const { match, candidate, suggestions } = data;
    document.getElementById('resultsPortal').style.display = 'block';
    
    animateValue('finalScore', 0, match.score, 1200);
    document.getElementById('gradeLabel').textContent = match.label;

    renderTags('matchedSkills', match.matched_skills.map(s => s.job_skill), 'tag-active');
    renderTags('missingSkills', match.missing_skills, 'tag-dim');
    renderTags('allSkills', candidate.resume_skills, 'data-tag');

    const box = document.getElementById('suggestionsBox');
    box.innerHTML = suggestions.map(s => `
      <div class="protocol-step">
        <div style="font-weight:900; margin-bottom:8px;">// TARGET: ${s.skill.toUpperCase()}</div>
        <div class="mono" style="font-size:0.85rem; color:var(--text-dim);">PROTOCOL: ${s.resources.join(' | ')}</div>
      </div>
    `).join('') || '<div class="mono">// PROFILE OPTIMIZED.</div>';

    window.scrollTo({ top: document.getElementById('resultsPortal').offsetTop - 100, behavior: 'smooth' });
  }

  function renderTags(id, tags, className) {
    const el = document.getElementById(id);
    el.innerHTML = tags.map(t => `<div class="data-tag ${className}">${t}</div>`).join('') || '<div class="mono">// NO DATA</div>';
  }

  function animateValue(id, start, end, duration) {
    const obj = document.getElementById(id);
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      obj.innerHTML = Math.floor(progress * (end - start) + start);
      if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
  }

  function setLoading(active) {
    const btn = document.getElementById('analyzeBtn');
    const loader = document.getElementById('loader');
    const text = document.getElementById('btnText');
    btn.disabled = active;
    loader.style.display = active ? 'block' : 'none';
    text.style.display = active ? 'none' : 'block';
  }

  function notify(msg) {
    const n = document.getElementById('notifier');
    n.textContent = msg;
    n.style.display = 'block';
    setTimeout(() => n.style.display = 'none', 4000);
  }
</script>
</body>
</html>
